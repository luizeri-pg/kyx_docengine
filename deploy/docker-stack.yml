# DocEngine — Swarm + Traefik (formato minimalista NotifyHub).
# Exportar antes do deploy: REGISTRY, TAG, STACK_NAME, API_HOST, WEB_HOST,
# CONNECTION_STRING_DEFAULT, JWT_SECRET_KEY
#
# Atenção: palavras-passe com " $ \ ou quebras de linha podem partir o YAML após substituição.
# Nesse caso use Docker secrets / ficheiro env com aspas corretas ou base64 no pipeline.
#
#   docker stack deploy --with-registry-auth -c deploy/docker-stack.yml <stack>
#
# Stack completo com Postgres local: compose.stack.yaml na raiz.
version: "3.9"

services:
  api:
    image: ${REGISTRY}/docengine-api:${TAG}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "${CONNECTION_STRING_DEFAULT}"
      Hangfire__Storage: Memory
      Database__ApplyMigrationsOnStartup: "true"
      Cors__AllowedOrigins__0: "https://${WEB_HOST}"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      # true em dev (pipeline exporta); hmg/prd: omitir SWAGGER_ENABLED → false
      Swagger__Enabled: "${SWAGGER_ENABLED:-false}"
      # tb_usuario legado KYX/Notify (id_usuario, str_login, bloqueado, …). Sem isto, Production usa id/nome do appsettings.json → consulta falha → 401 «Serviço de autenticação indisponível».
      # BD criada só pelas migrações DocEngine (colunas id, nome, …): remova este bloco ou use compose local.
      Schema__Usuario__Id: id_usuario
      Schema__Usuario__Nome: str_descricao
      Schema__Usuario__Email: email
      Schema__Usuario__Login: str_login
      Schema__Usuario__Senha: str_senha
      Schema__Usuario__PerfilId: ''
      Schema__Usuario__Ativo: bloqueado
      Schema__Usuario__AtivoInverted: "true"
      Schema__Usuario__CriadoEm: dh_inclui
      Schema__Usuario__AtualizadoEm: dh_inclui
      Schema__Usuario__IdIntegerType: "true"
      Schema__Usuario__UniqueEmailIndex: "false"
      Schema__Perfil__Id: id_perfil
      Schema__Perfil__Nome: str_descricao
      Schema__Perfil__Descricao: ''
      Schema__Perfil__CriadoEm: dh_inclui
      Schema__Perfil__AtualizadoEm: dh_inclui
      Schema__Perfil__IdIntegerType: "true"
      Schema__LogRequisicao__Id: id
      Schema__LogRequisicao__RequisicaoId: requisicao_id
      Schema__LogRequisicao__UsuarioId: usuario_id
      Schema__LogRequisicao__Canal: ''
      Schema__LogRequisicao__CentroCusto: centro_custo
      Schema__LogRequisicao__RequestPayload: request_payload
      Schema__LogRequisicao__ResponsePayload: response_payload
      Schema__LogRequisicao__StatusHttp: status_http
      Schema__LogRequisicao__TempoRespostaMs: tempo_resposta_ms
      Schema__LogRequisicao__Erro: erro
      Schema__LogRequisicao__CriadoEm: criado_em
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.mode=swarm"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.routers.docengine-api-${STACK_NAME}.rule=Host(`${API_HOST}`)"
        - "traefik.http.routers.docengine-api-${STACK_NAME}.entrypoints=websecure"
        - "traefik.http.routers.docengine-api-${STACK_NAME}.tls=true"
        - "traefik.http.services.docengine-api-${STACK_NAME}.loadbalancer.server.port=8080"
        - "traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https"
    networks:
      - docengine-net
      - traefik_public

  frontend:
    image: ${REGISTRY}/docengine-web:${TAG}
    environment:
      # Nome do serviço API na mesma rede overlay (deploy/docker-stack.yml → service "api").
      API_UPSTREAM_HOST: api
      API_UPSTREAM_PORT: "8080"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.mode=swarm"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.routers.docengine-web-${STACK_NAME}.rule=Host(`${WEB_HOST}`)"
        - "traefik.http.routers.docengine-web-${STACK_NAME}.entrypoints=websecure"
        - "traefik.http.routers.docengine-web-${STACK_NAME}.tls=true"
        - "traefik.http.services.docengine-web-${STACK_NAME}.loadbalancer.server.port=80"
        - "traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https"
    networks:
      - docengine-net
      - traefik_public

networks:
  docengine-net:
    driver: overlay
  traefik_public:
    external: true
