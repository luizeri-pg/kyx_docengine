# Swarm + Traefik — deploy: export REGISTRY TAG STACK_NAME API_HOST WEB_HOST POSTGRES_* JWT_SECRET_KEY
# e: docker stack deploy --with-registry-auth -c deploy/docker-stack.yml [-c deploy/docker-stack.env.yml] <stack>
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - docengine_pg:/var/lib/postgresql/data
    networks:
      - docengine-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - docengine-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    image: ${REGISTRY}/${IMAGE_REPOSITORY_API}:${TAG}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:3000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: redis:6379
      Hangfire__Storage: Redis
      Database__ApplyMigrationsOnStartup: "true"
      Cors__AllowedOrigins__0: "https://${WEB_HOST}"
      Jwt__SecretKey: ${JWT_SECRET_KEY}
    networks:
      - docengine-net
      - traefik_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.mode=swarm"
        - "traefik.http.middlewares.docengine-sslheader.headers.customrequestheaders.X-Forwarded-Proto=https"
        - "traefik.http.routers.docengine-api-${STACK_NAME}.rule=Host(`${API_HOST}`)"
        - "traefik.http.routers.docengine-api-${STACK_NAME}.entrypoints=websecure"
        - "traefik.http.routers.docengine-api-${STACK_NAME}.tls=true"
        - "traefik.http.routers.docengine-api-${STACK_NAME}.middlewares=docengine-sslheader"
        - "traefik.http.services.docengine-api-${STACK_NAME}.loadbalancer.server.port=3000"
        - "traefik.http.routers.docengine-hangfire-${STACK_NAME}.rule=Host(`${API_HOST}`) && PathPrefix(`/hangfire`)"
        - "traefik.http.routers.docengine-hangfire-${STACK_NAME}.entrypoints=websecure"
        - "traefik.http.routers.docengine-hangfire-${STACK_NAME}.tls=true"
        - "traefik.http.routers.docengine-hangfire-${STACK_NAME}.middlewares=docengine-sslheader"
        - "traefik.http.routers.docengine-hangfire-${STACK_NAME}.service=docengine-api-${STACK_NAME}"
        - "traefik.http.routers.docengine-hangfire-${STACK_NAME}.priority=20"

  web:
    image: ${REGISTRY}/${IMAGE_REPOSITORY_WEB}:${TAG}
    networks:
      - docengine-net
      - traefik_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.mode=swarm"
        - "traefik.http.middlewares.docengine-sslheader.headers.customrequestheaders.X-Forwarded-Proto=https"
        - "traefik.http.routers.docengine-web-${STACK_NAME}.rule=Host(`${WEB_HOST}`)"
        - "traefik.http.routers.docengine-web-${STACK_NAME}.entrypoints=websecure"
        - "traefik.http.routers.docengine-web-${STACK_NAME}.tls=true"
        - "traefik.http.routers.docengine-web-${STACK_NAME}.middlewares=docengine-sslheader"
        - "traefik.http.services.docengine-web-${STACK_NAME}.loadbalancer.server.port=80"

networks:
  docengine-net:
    driver: overlay
    attachable: true
  traefik_public:
    external: true

volumes:
  docengine_pg:
