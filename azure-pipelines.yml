# DocEngine — build + push das imagens no registry (sem deploy Swarm aqui).
#
# VITE_API_URL: default no YAML; sobrescreve em Pipeline → Variables se precisar.
# Service connection Docker: dockerRegistryServiceConnection.
#
# API: dotnet publish em ubuntu-latest (RAM/GLIBC ok). O self-hosted server28 não
# aguenta o SDK no Docker (137 / CoreCLR). O artefacto `api-publish` é baixado
# no server28; Docker@2 usa só Dockerfile.publish (runtime + pasta publish/).
#
# Requisito: pipelines com agente Microsoft-hosted permitidos no projeto/org.

trigger:
  branches:
    include:
      - main
      - dev

variables:
  dockerRegistryServiceConnection: docker.partner
  imageRepositoryApi: docengine-api
  imageRepositoryWeb: docengine-web
  VITE_API_URL: "https://api-docengine.partner1.com.br"

jobs:
  - job: PublishApi
    displayName: Publish API (Microsoft-hosted)
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self
        fetchDepth: 1

      - task: UseDotNet@2
        displayName: Instalar .NET 10 SDK
        inputs:
          packageType: sdk
          version: 10.0.x

      - script: |
          set -e
          export NUGET_XMLDOC_MODE=skip DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 DOTNET_NOLOGO=1
          cd backend/KYX.DocEngine.API
          dotnet restore KYX.DocEngine.API.csproj --verbosity minimal --disable-parallel
          dotnet publish KYX.DocEngine.API.csproj -c Release -o ./publish --no-restore -v minimal \
            /p:MaxCpuCount=1 /p:BuildInParallel=false /p:RunAnalyzers=false /p:UseSharedCompilation=false
        displayName: dotnet publish → backend/KYX.DocEngine.API/publish

      - task: PublishPipelineArtifact@1
        displayName: Publicar artefacto api-publish
        inputs:
          targetPath: "$(Build.SourcesDirectory)/backend/KYX.DocEngine.API/publish"
          artifactName: api-publish

  - job: BuildPush
    displayName: Build e push imagens (self-hosted)
    dependsOn: PublishApi
    pool:
      name: server28
    steps:
      - checkout: self
        fetchDepth: 1

      - task: DownloadPipelineArtifact@2
        displayName: Baixar saída publish da API
        inputs:
          buildType: current
          artifactName: api-publish
          targetPath: "$(Build.SourcesDirectory)/backend/KYX.DocEngine.API/publish"

      - task: Docker@2
        displayName: Build & Push frontend
        inputs:
          containerRegistry: $(dockerRegistryServiceConnection)
          repository: $(imageRepositoryWeb)
          command: buildAndPush
          Dockerfile: frontend/Dockerfile
          buildContext: frontend
          arguments: "--build-arg VITE_API_URL=$(VITE_API_URL)"
          tags: |
            $(Build.BuildId)
            latest

      - task: Docker@2
        displayName: Build & Push API (imagem runtime + Chromium)
        inputs:
          containerRegistry: $(dockerRegistryServiceConnection)
          repository: $(imageRepositoryApi)
          command: buildAndPush
          Dockerfile: backend/KYX.DocEngine.API/Dockerfile.publish
          buildContext: backend/KYX.DocEngine.API
          tags: |
            $(Build.BuildId)
            latest
