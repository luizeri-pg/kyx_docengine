# DocEngine — alinhado à estrutura NotifyHub (stages Build + Deploy Dev/HMG/PRD).
# Build (server28): publish .NET em Docker → imagem API → imagem web (se a API falhar, não empurra web órfão).
# Se o passo SDK falhar com 137, isolar restore/publish ou aumentar RAM no agente.
# Deploy (server31): docker stack deploy com deploy/docker-stack.yml
#
# Secrets (Library / grupo ligado ao pipeline):
#   Npgsql: DOCENGINE_ConnectionStrings__DefaultConnection (recomendado) ou CONNECTION_STRING_DEFAULT
#   JWT: DOCENGINE_Jwt__SecretKey (recomendado) ou JWT_SECRET_KEY
#   ACR_USERNAME, ACR_PASSWORD
#
# Ambientes Azure DevOps: hmg, prd (como no NotifyHub).

trigger:
  branches:
    include:
      - main
      - dev

variables:
  containerRegistry: registry.kubernetes.partner1.com.br
  dockerRegistryServiceConnection: docker.partner
  imageRepositoryApi: docengine-api
  imageRepositoryWeb: docengine-web
  imageTag: $(Build.BuildId)
  dotNetSdkContainer: mcr.microsoft.com/dotnet/sdk:10.0-alpine
  stackNameDev: docengine-dev
  stackNameHmg: docengine-hmg
  stackNamePrd: docengine-prd
  apiHostDev: dev-api-docengine.partner1.com.br
  webHostDev: dev-app-docengine.partner1.com.br
  apiHostHmg: hmg-api-docengine.partner1.com.br
  webHostHmg: hmg-app-docengine.partner1.com.br
  apiHostPrd: api-docengine.partner1.com.br
  webHostPrd: app-docengine.partner1.com.br

stages:
  - stage: Build
    displayName: Build and Push
    jobs:
      - job: DockerBuildPush
        displayName: Build and push images
        pool:
          name: server28
        steps:
          - checkout: self
            fetchDepth: 0

          - script: |
              set -e
              SRC="$(Build.SourcesDirectory)"
              NUGET_CACHE="$(Agent.TempDirectory)/docengine-nuget"
              mkdir -p "$NUGET_CACHE"
              IMG="$(dotNetSdkContainer)"
              docker run --rm \
                -v "$SRC:/src" \
                -v "$NUGET_CACHE:/nuget" \
                -w /src/backend/KYX.DocEngine.API \
                -e NUGET_PACKAGES=/nuget \
                -e DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 \
                -e DOTNET_NOLOGO=1 \
                -e NUGET_XMLDOC_MODE=skip \
                -e DOTNET_gcServer=0 \
                -e DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1 \
                "$IMG" \
                sh -c 'dotnet restore KYX.DocEngine.API.csproj --verbosity minimal --disable-parallel -r linux-musl-x64'
              docker run --rm \
                -v "$SRC:/src" \
                -v "$NUGET_CACHE:/nuget" \
                -w /src/backend/KYX.DocEngine.API \
                -e NUGET_PACKAGES=/nuget \
                -e DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 \
                -e DOTNET_NOLOGO=1 \
                -e NUGET_XMLDOC_MODE=skip \
                -e DOTNET_gcServer=0 \
                -e DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1 \
                "$IMG" \
                sh -c 'dotnet publish KYX.DocEngine.API.csproj -c Release -o ./publish -r linux-musl-x64 --self-contained false --no-restore -v minimal /p:MaxCpuCount=1 /p:BuildInParallel=false /p:RunAnalyzers=false /p:UseSharedCompilation=false'
            displayName: dotnet publish API (SDK Alpine, 2x docker run)

          - task: Docker@2
            displayName: Build & Push backend
            inputs:
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(imageRepositoryApi)
              command: buildAndPush
              Dockerfile: backend/KYX.DocEngine.API/Dockerfile.publish
              buildContext: backend/KYX.DocEngine.API
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: Build & Push frontend
            inputs:
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(imageRepositoryWeb)
              command: buildAndPush
              Dockerfile: frontend/Dockerfile
              buildContext: frontend
              # Mesmo host da app + proxy nginx /api/ → API (sem CORS nem expor dev-api no browser).
              arguments: "--build-arg VITE_API_URL=/api"
              tags: |
                $(imageTag)
                latest

  - stage: Deploy
    displayName: Deploy Dev
    dependsOn: Build
    jobs:
      - job: SwarmDeploy
        displayName: Deploy stack on Swarm manager (Dev)
        pool:
          name: server31
        steps:
          - checkout: self
            fetchDepth: 1

          # Variáveis secretas: injetar em env:; nomes DOCENGINE_* alinhados à config ASP.NET na Library.
          - script: |
              set -e
              CONNECTION_STRING_DEFAULT="${_CS_DOCENGINE:-${_CS_LEGACY}}"
              JWT_SECRET_KEY="${_JWT_DOCENGINE:-${_JWT_LEGACY}}"
              export CONNECTION_STRING_DEFAULT JWT_SECRET_KEY
              if [ -z "$CONNECTION_STRING_DEFAULT" ]; then
                echo "##vso[task.logissue type=error]Connection string vazia: DOCENGINE_ConnectionStrings__DefaultConnection ou CONNECTION_STRING_DEFAULT na Library."
                exit 1
              fi
              if [ -z "$JWT_SECRET_KEY" ]; then
                echo "##vso[task.logissue type=error]JWT vazio: DOCENGINE_Jwt__SecretKey ou JWT_SECRET_KEY na Library."
                exit 1
              fi
              export REGISTRY=$(containerRegistry)
              export TAG=$(imageTag)
              export API_HOST=$(apiHostDev)
              export WEB_HOST=$(webHostDev)
              export STACK_NAME=$(stackNameDev)
              export SWAGGER_ENABLED=true
              docker login $(containerRegistry) -u "$(ACR_USERNAME)" -p "$(ACR_PASSWORD)"
              docker stack deploy --with-registry-auth -c deploy/docker-stack.yml ${STACK_NAME}
              echo "--- Estado dos serviços (API = ${STACK_NAME}_api) ---"
              docker stack services "${STACK_NAME}" || true
              docker service ps "${STACK_NAME}_api" --no-trunc 2>/dev/null || true
            displayName: Deploy stack
            env:
              _CS_DOCENGINE: $(DOCENGINE_ConnectionStrings__DefaultConnection)
              _CS_LEGACY: $(CONNECTION_STRING_DEFAULT)
              _JWT_DOCENGINE: $(DOCENGINE_Jwt__SecretKey)
              _JWT_LEGACY: $(JWT_SECRET_KEY)

  - stage: DeployHmg
    displayName: Deploy HMG
    dependsOn: Deploy
    jobs:
      - deployment: SwarmDeployHmg
        displayName: Deploy stack on Swarm manager (HMG)
        pool:
          name: server31
        environment: hmg
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  fetchDepth: 1

                - script: |
                    set -e
                    CONNECTION_STRING_DEFAULT="${_CS_DOCENGINE:-${_CS_LEGACY}}"
                    JWT_SECRET_KEY="${_JWT_DOCENGINE:-${_JWT_LEGACY}}"
                    export CONNECTION_STRING_DEFAULT JWT_SECRET_KEY
                    if [ -z "$CONNECTION_STRING_DEFAULT" ] || [ -z "$JWT_SECRET_KEY" ]; then
                      echo "##vso[task.logissue type=error]Connection string ou JWT vazios (HMG). DOCENGINE_* ou nomes legacy na Library; grupo ligado ao ambiente hmg."
                      exit 1
                    fi
                    export REGISTRY=$(containerRegistry)
                    export TAG=$(imageTag)
                    export API_HOST=$(apiHostHmg)
                    export WEB_HOST=$(webHostHmg)
                    export STACK_NAME=$(stackNameHmg)
                    docker login $(containerRegistry) -u "$(ACR_USERNAME)" -p "$(ACR_PASSWORD)"
                    docker stack deploy --with-registry-auth -c deploy/docker-stack.yml ${STACK_NAME}
                    docker stack services "${STACK_NAME}" || true
                    docker service ps "${STACK_NAME}_api" --no-trunc 2>/dev/null || true
                  displayName: Deploy stack
                  env:
                    _CS_DOCENGINE: $(DOCENGINE_ConnectionStrings__DefaultConnection)
                    _CS_LEGACY: $(CONNECTION_STRING_DEFAULT)
                    _JWT_DOCENGINE: $(DOCENGINE_Jwt__SecretKey)
                    _JWT_LEGACY: $(JWT_SECRET_KEY)

  - stage: DeployPrd
    displayName: Deploy PRD
    dependsOn: DeployHmg
    jobs:
      - deployment: SwarmDeployPrd
        displayName: Deploy stack on Swarm manager (PRD)
        pool:
          name: server31
        environment: prd
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  fetchDepth: 1

                - script: |
                    set -e
                    CONNECTION_STRING_DEFAULT="${_CS_DOCENGINE:-${_CS_LEGACY}}"
                    JWT_SECRET_KEY="${_JWT_DOCENGINE:-${_JWT_LEGACY}}"
                    export CONNECTION_STRING_DEFAULT JWT_SECRET_KEY
                    if [ -z "$CONNECTION_STRING_DEFAULT" ] || [ -z "$JWT_SECRET_KEY" ]; then
                      echo "##vso[task.logissue type=error]Connection string ou JWT vazios (PRD). DOCENGINE_* ou nomes legacy na Library; grupo ligado ao ambiente prd."
                      exit 1
                    fi
                    export REGISTRY=$(containerRegistry)
                    export TAG=$(imageTag)
                    export API_HOST=$(apiHostPrd)
                    export WEB_HOST=$(webHostPrd)
                    export STACK_NAME=$(stackNamePrd)
                    docker login $(containerRegistry) -u "$(ACR_USERNAME)" -p "$(ACR_PASSWORD)"
                    docker stack deploy --with-registry-auth -c deploy/docker-stack.yml ${STACK_NAME}
                    docker stack services "${STACK_NAME}" || true
                    docker service ps "${STACK_NAME}_api" --no-trunc 2>/dev/null || true
                  displayName: Deploy stack
                  env:
                    _CS_DOCENGINE: $(DOCENGINE_ConnectionStrings__DefaultConnection)
                    _CS_LEGACY: $(CONNECTION_STRING_DEFAULT)
                    _JWT_DOCENGINE: $(DOCENGINE_Jwt__SecretKey)
                    _JWT_LEGACY: $(JWT_SECRET_KEY)
