# Path in ADO: /azure-pipelines.yml
#
# Pool: vmImage (ubuntu-latest) exige o pool alojado "Azure Pipelines" autorizado na org.
# Se vês "Could not find a pool with name Azure Pipelines", usa um pool que exista no projeto:
#   Project Settings → Agent pools → copia o nome exato.
#
# Opção A — agentes self-hosted (nome típico Default):
pool:
  name: Default
#
# Opção B — quando a org autorizar agentes Microsoft-hosted, troca o bloco pool por:
# pool:
#   vmImage: ubuntu-latest
#
# Autorização hosted: https://aka.ms/yamlauthz

trigger:
  - main

jobs:
  - job: Build
    displayName: Docker Compose
    steps:
      - checkout: self

      - script: docker compose version
        displayName: Compose version

      - script: docker compose -f compose.yaml config
        displayName: Validate compose.yaml

      - script: docker compose -f compose.yaml build
        displayName: Build api and web

      - script: |
          set -e
          export REGISTRY=ci.local/docengine TAG=ci STACK_NAME=ci
          export API_HOST=api.ci.local WEB_HOST=app.ci.local
          export POSTGRES_USER=p POSTGRES_PASSWORD=p POSTGRES_DB=docengine
          export JWT_SECRET_KEY=01234567890123456789012345678901
          docker compose -f compose.stack.yaml config -q
        displayName: Validar compose.stack.yaml (Swarm/Traefik)
