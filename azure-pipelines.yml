# =============================================================================
# Pipeline Azure DevOps — caminho obrigatório no ADO: /azure-pipelines.yml
#
# Erro "Could not find valid pipeline YAML"?
#  • O commit b7595cb NÃO tinha este ficheiro — atualiza o branch main no Repos (último main).
#  • Pipeline "docengine" → Editar → ⋮ (More actions) → Triggers → YAML →
#    "YAML file path" = /azure-pipelines.yml
#    (NÃO use docker-compose.yml nem compose.yaml — isso é Docker Compose, não pipeline.)
# =============================================================================
trigger:
  branches:
    include:
      - main

stages:
  - stage: CI
    displayName: CI
    jobs:
      - job: DockerComposeBuild
        displayName: Validar e build Compose
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 1

          - script: docker compose version
            displayName: Versão Docker Compose

          - script: docker compose -f compose.yaml config
            displayName: Validar compose.yaml

          - script: docker compose -f compose.yaml build
            displayName: Build imagens (api + web)
