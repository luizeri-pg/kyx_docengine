# DocEngine — apenas build + push das imagens no registry (sem deploy Swarm aqui).
#
# VITE_API_URL: default no YAML abaixo; sobrescreve em Pipeline → Variables se a API tiver outro host.
# Service connection Docker: dockerRegistryServiceConnection (ex.: docker.partner).
# API: dotnet restore/publish dentro de docker run (sdk:10.0) — o agente tem GLIBC antiga e não corre o SDK no host;
#      em seguida Docker@2 com Dockerfile.publish (só runtime + artefactos).
# Pool: server28 (NotifyHub).
#
trigger:
  branches:
    include:
      - main
      - dev

variables:
  dockerRegistryServiceConnection: docker.partner
  imageRepositoryApi: docengine-api
  imageRepositoryWeb: docengine-web
  # URL da API no bundle do front (ajusta ou define a mesma variável no pipeline ADO)
  VITE_API_URL: "https://api-docengine.partner1.com.br"

jobs:
  - job: BuildPush
    displayName: Build e push API + Web
    pool:
      name: server28
    steps:
      - checkout: self
        fetchDepth: 1

      - task: Docker@2
        displayName: Build & Push frontend
        inputs:
          containerRegistry: $(dockerRegistryServiceConnection)
          repository: $(imageRepositoryWeb)
          command: buildAndPush
          Dockerfile: frontend/Dockerfile
          buildContext: frontend
          arguments: "--build-arg VITE_API_URL=$(VITE_API_URL)"
          tags: |
            $(Build.BuildId)
            latest

      - script: |
          set -e
          SRC="$(Build.SourcesDirectory)"
          docker run --rm \
            -v "$SRC:/src" \
            -w /src/backend/KYX.DocEngine.API \
            -e DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 \
            -e DOTNET_NOLOGO=1 \
            -e NUGET_XMLDOC_MODE=skip \
            -e DOTNET_gcServer=0 \
            mcr.microsoft.com/dotnet/sdk:10.0 \
            bash -c 'dotnet restore KYX.DocEngine.API.csproj --verbosity minimal --disable-parallel && dotnet publish KYX.DocEngine.API.csproj -c Release -o ./publish --no-restore -v minimal /p:MaxCpuCount=1 /p:BuildInParallel=false /p:RunAnalyzers=false /p:UseSharedCompilation=false'
        displayName: dotnet publish API (container SDK — GLIBC do host incompatível)

      - task: Docker@2
        displayName: Build & Push API (imagem runtime + Chromium)
        inputs:
          containerRegistry: $(dockerRegistryServiceConnection)
          repository: $(imageRepositoryApi)
          command: buildAndPush
          Dockerfile: backend/KYX.DocEngine.API/Dockerfile.publish
          buildContext: backend/KYX.DocEngine.API
          tags: |
            $(Build.BuildId)
            latest
