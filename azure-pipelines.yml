# DocEngine — apenas build + push das imagens no registry (sem deploy Swarm aqui).
#
# Antes de correr:
#   1) Pipeline → Edit → Variables → cria VITE_API_URL (ex.: https://api-docengine.teudominio.com)
#   2) Service connection Docker com o mesmo nome que dockerRegistryServiceConnection (ex.: docker.partner)
#   3) Agent pool: igual NotifyHub — build em server28; deploy Swarm (se voltares a acrescentar) em server31.
#
trigger:
  branches:
    include:
      - main
      - dev

variables:
  dockerRegistryServiceConnection: docker.partner
  imageRepositoryApi: docengine-api
  imageRepositoryWeb: docengine-web
  # Sobrescreve em Pipeline → Variables (obrigatório)
  VITE_API_URL: ""

jobs:
  - job: BuildPush
    displayName: Build e push API + Web
    pool:
      name: server28
    steps:
      - checkout: self
        fetchDepth: 1

      - script: |
          set -e
          if [ -z "$(VITE_API_URL)" ] || [ "$(VITE_API_URL)" = "" ]; then
            echo "##[error]Define a variável VITE_API_URL no pipeline (URL HTTPS da API para o front)."
            exit 1
          fi
        displayName: Validar VITE_API_URL

      - task: Docker@2
        displayName: Build & Push frontend
        inputs:
          containerRegistry: $(dockerRegistryServiceConnection)
          repository: $(imageRepositoryWeb)
          command: buildAndPush
          Dockerfile: frontend/Dockerfile
          buildContext: frontend
          arguments: "--build-arg VITE_API_URL=$(VITE_API_URL)"
          tags: |
            $(Build.BuildId)
            latest

      - task: Docker@2
        displayName: Build & Push API
        inputs:
          containerRegistry: $(dockerRegistryServiceConnection)
          repository: $(imageRepositoryApi)
          command: buildAndPush
          Dockerfile: backend/KYX.DocEngine.API/Dockerfile
          buildContext: backend/KYX.DocEngine.API
          tags: |
            $(Build.BuildId)
            latest
