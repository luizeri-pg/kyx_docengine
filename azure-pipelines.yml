# Path in ADO must be: /azure-pipelines.yml (not compose.yaml)
trigger:
  - main

jobs:
  - job: Build
    displayName: Docker Compose
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self

      - script: docker compose version
        displayName: Compose version

      - script: docker compose -f compose.yaml config
        displayName: Validate compose.yaml

      - script: docker compose -f compose.yaml build
        displayName: Build api and web
