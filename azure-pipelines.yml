# DocEngine — build + push das imagens no registry (sem deploy Swarm aqui).
#
# Pool único: self-hosted (ex.: server28). Não usa Microsoft-hosted — muitas orgs não têm
# o pool "Azure Pipelines" autorizado (aka.ms/yamlauthz).
#
# Publish da API: docker run mcr.microsoft.com/dotnet/sdk:10.0 (GLIBC do host do agente
# é antigo demais para o SDK instalado no SO; dentro da imagem oficial funciona).
#
# VITE_API_URL: sobrescreve em Pipeline → Variables se precisar.
# Service connection: dockerRegistryServiceConnection.

trigger:
  branches:
    include:
      - main
      - dev

variables:
  dockerRegistryServiceConnection: docker.partner
  imageRepositoryApi: docengine-api
  imageRepositoryWeb: docengine-web
  VITE_API_URL: "https://api-docengine.partner1.com.br"

jobs:
  - job: BuildPush
    displayName: Build e push API + Web
    pool:
      name: server28
    steps:
      - checkout: self
        fetchDepth: 1

      - script: |
          set -e
          SRC="$(Build.SourcesDirectory)"
          docker run --rm \
            -v "$SRC:/src" \
            -w /src/backend/KYX.DocEngine.API \
            -e DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 \
            -e DOTNET_NOLOGO=1 \
            -e NUGET_XMLDOC_MODE=skip \
            -e DOTNET_gcServer=0 \
            mcr.microsoft.com/dotnet/sdk:10.0 \
            bash -c 'dotnet restore KYX.DocEngine.API.csproj --verbosity minimal --disable-parallel && dotnet publish KYX.DocEngine.API.csproj -c Release -o ./publish --no-restore -v minimal /p:MaxCpuCount=1 /p:BuildInParallel=false /p:RunAnalyzers=false /p:UseSharedCompilation=false'
        displayName: dotnet publish API (container SDK)

      - task: Docker@2
        displayName: Build & Push frontend
        inputs:
          containerRegistry: $(dockerRegistryServiceConnection)
          repository: $(imageRepositoryWeb)
          command: buildAndPush
          Dockerfile: frontend/Dockerfile
          buildContext: frontend
          arguments: "--build-arg VITE_API_URL=$(VITE_API_URL)"
          tags: |
            $(Build.BuildId)
            latest

      - task: Docker@2
        displayName: Build & Push API (imagem runtime + Chromium)
        inputs:
          containerRegistry: $(dockerRegistryServiceConnection)
          repository: $(imageRepositoryApi)
          command: buildAndPush
          Dockerfile: backend/KYX.DocEngine.API/Dockerfile.publish
          buildContext: backend/KYX.DocEngine.API
          tags: |
            $(Build.BuildId)
            latest
